<script src="https://kit.fontawesome.com/02fcfcfe59.js" crossorigin="anonymous"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
<div id="dy-recommendations-${dyVariationId}">
    <div class="title-${dyVariationId} hidden">${Title}</div>
    <div class="subtitle-${dyVariationId}">${Subtitle}</div>
    <div class="dy-recommendations__slider-conatiner-${dyVariationId}">
        <div class="dy-recommendations__slider-${dyVariationId}">

            <!-- FILTRI DESKTOP -->
            <div class="dy-filters-${dyVariationId} dy-filters-desktop-${dyVariationId}">
                <div class="dy-filter-field-${dyVariationId}">
                    <label class="dy-filter-label-${dyVariationId}">Stelle</label>
                    <div class="dy-multiselect-${dyVariationId}" data-filter-group="star">
                        <button type="button" class="dy-multiselect-trigger-${dyVariationId}">
                            <span class="dy-multiselect-trigger-text-${dyVariationId}">Tutte le stelle</span>
                            <span class="dy-trigger-icon-${dyVariationId}"><svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M0.164063 9.78774L6.59181 3.43262C6.81625 3.2108 7.18375 3.2108 7.40819 3.43262L13.8359 9.78774C13.9427 9.89318 14 10.0332 14 10.1771C14 10.3211 13.9427 10.4611 13.8359 10.5665L13.7563 10.6321C13.5319 10.7857 13.2191 10.7634 13.0196 10.5665L7 4.61387L0.980437 10.5665C0.756 10.7883 0.3885 10.7883 0.164063 10.5665C-0.0546875 10.3499 -0.0546874 10.0043 0.164063 9.78774Z" fill="#002d72"/></svg></span>
                        </button>
                        <div class="dy-multiselect-dropdown-${dyVariationId} hidden">
                            <div class="dy-multiselect-options-${dyVariationId}" data-options="star"></div>
                            <div class="dy-multiselect-footer-${dyVariationId}">
                                <button type="button" class="dy-multiselect-reset-${dyVariationId}" data-reset-group="star">Rimuovi selezione</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="dy-filter-field-${dyVariationId}">
                    <label class="dy-filter-label-${dyVariationId}">Caratteristiche e Interessi</label>
                    <div class="dy-multiselect-${dyVariationId}" data-filter-group="tag">
                        <button type="button" class="dy-multiselect-trigger-${dyVariationId}">
                            <span class="dy-multiselect-trigger-text-${dyVariationId}">Tutte le caratteristiche</span>
                            <span class="dy-trigger-icon-${dyVariationId}"><svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M0.164063 9.78774L6.59181 3.43262C6.81625 3.2108 7.18375 3.2108 7.40819 3.43262L13.8359 9.78774C13.9427 9.89318 14 10.0332 14 10.1771C14 10.3211 13.9427 10.4611 13.8359 10.5665L13.7563 10.6321C13.5319 10.7857 13.2191 10.7634 13.0196 10.5665L7 4.61387L0.980437 10.5665C0.756 10.7883 0.3885 10.7883 0.164063 10.5665C-0.0546875 10.3499 -0.0546874 10.0043 0.164063 9.78774Z" fill="#002d72"/></svg></span>
                        </button>
                        <div class="dy-multiselect-dropdown-${dyVariationId} hidden">
                            <div class="dy-multiselect-options-${dyVariationId}" data-options="tag"></div>
                            <div class="dy-multiselect-footer-${dyVariationId}">
                                <button type="button" class="dy-multiselect-reset-${dyVariationId}" data-reset-group="tag">Rimuovi selezione</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="dy-filter-field-${dyVariationId}">
                    <label class="dy-filter-label-${dyVariationId}">Tipologia Vacanza</label>
                    <div class="dy-multiselect-${dyVariationId}" data-filter-group="tig">
                        <button type="button" class="dy-multiselect-trigger-${dyVariationId}">
                            <span class="dy-multiselect-trigger-text-${dyVariationId}">Tutte le tipologie</span>
                            <span class="dy-trigger-icon-${dyVariationId}"><svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M0.164063 9.78774L6.59181 3.43262C6.81625 3.2108 7.18375 3.2108 7.40819 3.43262L13.8359 9.78774C13.9427 9.89318 14 10.0332 14 10.1771C14 10.3211 13.9427 10.4611 13.8359 10.5665L13.7563 10.6321C13.5319 10.7857 13.2191 10.7634 13.0196 10.5665L7 4.61387L0.980437 10.5665C0.756 10.7883 0.3885 10.7883 0.164063 10.5665C-0.0546875 10.3499 -0.0546874 10.0043 0.164063 9.78774Z" fill="#002d72"/></svg></span>
                        </button>
                        <div class="dy-multiselect-dropdown-${dyVariationId} hidden">
                            <div class="dy-multiselect-options-${dyVariationId}" data-options="tig"></div>
                            <div class="dy-multiselect-footer-${dyVariationId}">
                                <button type="button" class="dy-multiselect-reset-${dyVariationId}" data-reset-group="tig">Rimuovi selezione</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="dy-filter-field-${dyVariationId}">
                    <label class="dy-filter-label-${dyVariationId}">Servizi</label>
                    <div class="dy-multiselect-${dyVariationId}" data-filter-group="ser">
                        <button type="button" class="dy-multiselect-trigger-${dyVariationId}">
                            <span class="dy-multiselect-trigger-text-${dyVariationId}">Tutti i servizi</span>
                            <span class="dy-trigger-icon-${dyVariationId}"><svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M0.164063 9.78774L6.59181 3.43262C6.81625 3.2108 7.18375 3.2108 7.40819 3.43262L13.8359 9.78774C13.9427 9.89318 14 10.0332 14 10.1771C14 10.3211 13.9427 10.4611 13.8359 10.5665L13.7563 10.6321C13.5319 10.7857 13.2191 10.7634 13.0196 10.5665L7 4.61387L0.980437 10.5665C0.756 10.7883 0.3885 10.7883 0.164063 10.5665C-0.0546875 10.3499 -0.0546874 10.0043 0.164063 9.78774Z" fill="#002d72"/></svg></span>
                        </button>
                        <div class="dy-multiselect-dropdown-${dyVariationId} hidden">
                            <input type="text" class="dy-multiselect-search-${dyVariationId}" placeholder="Cerca servizi">
                            <div class="dy-multiselect-options-${dyVariationId}" data-options="ser"></div>
                            <div class="dy-multiselect-footer-${dyVariationId}">
                                <button type="button" class="dy-multiselect-reset-${dyVariationId}" data-reset-group="ser">Rimuovi selezione</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- CHIPS FILTRI ATTIVI (desktop + mobile) -->
            <div class="dy-active-chips-${dyVariationId} hidden">
                <button type="button" class="dy-filter-reset-${dyVariationId} dy-filter-reset-inactive-${dyVariationId}">Rimuovi i filtri</button>
            </div>

            <!-- FILTRI MOBILE -->
            <div class="dy-filters-mobile-${dyVariationId}">
                <div class="dy-mobile-filter-bar-${dyVariationId}">
                    <span class="dy-mobile-filter-bar-label-${dyVariationId}">FILTRA PER</span>
                   <button type="button" class="dy-mobile-filter-toggle-${dyVariationId}" aria-label="Apri filtri">
    <svg width="18" height="14" viewBox="0 0 18 14" fill="none" xmlns="http://www.w3.org/2000/svg">
<path d="M10.2808 9.74981V11.25H18V12.2501H10.2808V13.7503H7.78106V12.2501H0V11.25H7.78106V9.74981H10.2808ZM14.7499 4.87463V6.37481H18V7.37494H14.7499V8.87512H12.2501V7.37494H0V6.37481H12.2501V4.87463H14.7499ZM5.74988 0V1.50019H18V2.50031H5.74988V4.0005H3.25012V2.50031H0V1.50019H3.25012V0H5.74988Z" fill="#002D72"/>
</svg>

    <svg class="dy-mobile-icon-chevron-${dyVariationId} hidden" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="#002d72" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="5,8 10,13 15,8"/>
    </svg>
</button>
                </div>

                <!-- PANNELLO FILTRI MOBILE -->
                <div class="dy-mobile-filter-panel-${dyVariationId} hidden">

                    <div class="dy-mobile-accordion-${dyVariationId}">
                        <!-- Stelle -->
                        <div class="dy-mobile-section-${dyVariationId}" data-mobile-group="star">
                            <div class="dy-mobile-section-header-${dyVariationId}">
                                <span>Stelle</span>
                                <span class="dy-mobile-section-icon-${dyVariationId}">+</span>
                            </div>
                            <div class="dy-mobile-section-body-${dyVariationId} hidden">
                                <div class="dy-multiselect-options-mobile-${dyVariationId}" data-mobile-options="star"></div>
                                <button type="button" class="dy-mobile-reset-group-${dyVariationId}" data-reset-group="star">Rimuovi selezione</button>
                            </div>
                        </div>

                        <!-- Caratteristiche -->
                        <div class="dy-mobile-section-${dyVariationId}" data-mobile-group="tag">
                            <div class="dy-mobile-section-header-${dyVariationId}">
                                <span>Caratteristiche e Interessi</span>
                                <span class="dy-mobile-section-icon-${dyVariationId}">+</span>
                            </div>
                            <div class="dy-mobile-section-body-${dyVariationId} hidden">
                                <div class="dy-multiselect-options-mobile-${dyVariationId}" data-mobile-options="tag"></div>
                                <button type="button" class="dy-mobile-reset-group-${dyVariationId}" data-reset-group="tag">Rimuovi selezione</button>
                            </div>
                        </div>

                        <!-- Tipologia Hotel -->
                        <div class="dy-mobile-section-${dyVariationId}" data-mobile-group="tig">
                            <div class="dy-mobile-section-header-${dyVariationId}">
                                <span>Tipologia Vacanza</span>
                                <span class="dy-mobile-section-icon-${dyVariationId}">+</span>
                            </div>
                            <div class="dy-mobile-section-body-${dyVariationId} hidden">
                                <div class="dy-multiselect-options-mobile-${dyVariationId}" data-mobile-options="tig"></div>
                                <button type="button" class="dy-mobile-reset-group-${dyVariationId}" data-reset-group="tig">Rimuovi selezione</button>
                            </div>
                        </div>

                        <!-- Servizi -->
                        <div class="dy-mobile-section-${dyVariationId}" data-mobile-group="ser">
                            <div class="dy-mobile-section-header-${dyVariationId}">
                                <span>Servizi</span>
                                <span class="dy-mobile-section-icon-${dyVariationId}">+</span>
                            </div>
                            <div class="dy-mobile-section-body-${dyVariationId} hidden">
                                <input type="text" class="dy-mobile-search-ser-${dyVariationId}" placeholder="Cerca servizi">
                                <div class="dy-multiselect-options-mobile-${dyVariationId}" data-mobile-options="ser"></div>
                                <button type="button" class="dy-mobile-reset-group-${dyVariationId}" data-reset-group="ser">Rimuovi selezione</button>
                            </div>
                        </div>
                    </div>

                    <div class="dy-mobile-panel-footer-${dyVariationId}">
                        <button type="button" class="dy-mobile-reset-all-${dyVariationId}">Rimuovi tutti i filtri</button>
                    </div>
                </div>
            </div>

            <div class="dy-empty-state-${dyVariationId} hidden">Nessun risultato con i filtri selezionati</div>

            <div class="dy-recommendations__slider-wrapper hidden"></div>
        </div>
        <div class="dy-recommendations-slider-pagination" role="navigation" aria-label="Slider pagination"></div>
        <div class="dy-recommendations-slider-arrows hidden">
            <div class="dy-recommendations-slider-button dy-recommendations-slider-button--prev" aria-label="Previous slide" tabindex="0"></div>
            <div class="dy-recommendations-slider-button dy-recommendations-slider-button--next" aria-label="Next slide" tabindex="0"></div>
        </div>
    </div>
</div>
